<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Yuvraj Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <button id="themeToggle" type="button" class="theme-toggle top-left-theme" aria-label="Switch to dark theme" aria-pressed="false">
        ☀️
      </button>
      <button id="searchToggle" type="button" class="action-toggle top-right-search" aria-label="Search items" aria-expanded="false">
        🔍
      </button>

      <header class="header">
        <h1 id="restaurantName">Hotel Yuvraj</h1>
        <p class="subtitle">Scan, browse, and order easily</p>
      </header>

      <section id="searchPanel" class="search-panel hidden" aria-label="Search menu items">
        <input id="searchInput" class="search-input" type="search" placeholder="Search by item or section..." autocomplete="off" />
      </section>
      <section id="searchResults" class="menu-list search-results hidden"></section>

      <section class="controls">
        <div class="filter-toggle" id="menuTypeToggle" role="group" aria-label="Choose menu type">
          <button type="button" class="filter-btn is-active menu-type-btn" data-menu-type="food">जेवण</button>
          <button type="button" class="filter-btn menu-type-btn" data-menu-type="drinks">पेये</button>
        </div>
      </section>

      <section class="controls" id="foodFilters">
        <div class="filter-toggle" role="group" aria-label="Filter by category">
          <button type="button" class="filter-btn is-active food-filter-btn" data-food-filter="veg">शाकाहारी</button>
          <button type="button" class="filter-btn food-filter-btn" data-food-filter="non-veg">मांसाहारी</button>
        </div>
      </section>

      <section class="controls hidden" id="drinkFilters">
        <div class="filter-toggle" role="group" aria-label="Filter drinks">
          <button type="button" class="filter-btn is-active drink-filter-btn" data-drink-filter="alcohol">Alcohol</button>
          <button type="button" class="filter-btn drink-filter-btn" data-drink-filter="non-alcoholic">Non-Alcoholic</button>
        </div>
      </section>

      <section id="status" class="status">Loading menu...</section>
      <section class="menu-content" id="menuContent">
        <aside class="section-panel hidden" id="foodSectionPanel">
          <p class="panel-title">Food Sections</p>
          <div class="vertical-tabs" id="foodSectionTabs" role="group" aria-label="Food section filter"></div>
        </aside>
        <aside class="section-panel hidden" id="drinkSectionPanel">
          <p class="panel-title">Drink Sections</p>
          <div class="vertical-tabs" id="drinkSectionTabs" role="group" aria-label="Drink section filter"></div>
        </aside>
        <section id="menuList" class="menu-list"></section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
